<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Meggs Supply — Painel de Compras</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --bg: #EFF5FB;
  --surface: #FFFFFF;
  --ink: #172436;
  --ink-soft: #5D7690;
  --line: #D7E5F2;
  --teal: #2E8BD6;
  --teal-dark: #1B5A8C;
  --blue-pale: #E4F1FC;
  --amber: #E0932E;
  --amber-soft: #FDF1DE;
  --danger: #B4483A;
  --radius: 10px;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  font-size:14px;
  -webkit-font-smoothing:antialiased;
}
.app{
  display:flex;
  min-height:100vh;
}
/* Sidebar */
.sidebar{
  width:220px;
  flex-shrink:0;
  background:var(--teal-dark);
  color:#EAF4FC;
  padding:24px 16px;
  display:flex;
  flex-direction:column;
  gap:4px;
}
.brand{
  font-family:'Space Grotesk',sans-serif;
  font-weight:700;
  font-size:18px;
  letter-spacing:-0.02em;
  color:#fff;
  margin:0 0 2px 4px;
}
.brand-sub{
  font-size:11px;
  color:#8FB8DE;
  margin:0 0 24px 4px;
  letter-spacing:0.04em;
  text-transform:uppercase;
}
.nav-btn{
  display:flex;
  align-items:center;
  gap:10px;
  border:none;
  background:transparent;
  color:#CFE4F5;
  font-size:13.5px;
  font-weight:500;
  padding:10px 12px;
  border-radius:8px;
  cursor:pointer;
  text-align:left;
  font-family:'Inter',sans-serif;
  transition:background .15s ease, color .15s ease;
}
.nav-btn:hover{ background:rgba(255,255,255,0.08); color:#fff;}
.nav-btn.active{ background:var(--amber); color:#241503; font-weight:600;}
.nav-icon{ width:16px; text-align:center; opacity:0.9;}

.sidebar-foot{
  margin-top:auto;
  font-size:11px;
  color:#7FA3C7;
  padding:0 4px;
  line-height:1.5;
}

/* Main */
.main{
  flex:1;
  padding:32px 40px;
  max-width:1100px;
}
.page-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:24px;
  font-weight:600;
  margin:0 0 4px 0;
  letter-spacing:-0.01em;
}
.page-sub{
  color:var(--ink-soft);
  margin:0 0 28px 0;
  font-size:13.5px;
}

/* Search */
.search-box{
  position:relative;
  margin-bottom:24px;
}
.search-box input{
  width:100%;
  padding:14px 16px 14px 44px;
  border-radius:var(--radius);
  border:1.5px solid var(--line);
  background:var(--surface);
  font-size:15px;
  font-family:'Inter',sans-serif;
  color:var(--ink);
  outline:none;
  transition:border-color .15s ease;
}
.search-box input:focus{ border-color:var(--teal); }
.search-box .icon{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  color:var(--ink-soft);
  font-size:16px;
}

.item-card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  margin-bottom:14px;
  overflow:hidden;
}
.item-card-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 18px;
  cursor:pointer;
  gap:12px;
}
.item-card-head:hover{ background:#FAFBFB; }
.item-name{
  font-weight:600;
  font-size:15px;
}
.item-meta{
  font-size:12px;
  color:var(--ink-soft);
  margin-top:2px;
}
.item-count{
  font-size:12px;
  color:var(--teal);
  font-weight:600;
  background:#E4F1FC;
  padding:4px 10px;
  border-radius:20px;
  white-space:nowrap;
}
.chevron{
  color:var(--ink-soft);
  font-size:12px;
  transition:transform .15s ease;
}
.chevron.open{ transform:rotate(90deg); }

.offer-table{
  border-top:1px solid var(--line);
}
.offer-row{
  display:grid;
  grid-template-columns:28px 1.6fr 1fr 1fr 1.4fr 0.9fr;
  gap:10px;
  align-items:center;
  padding:12px 18px;
  border-bottom:1px solid #EEF2F1;
  font-size:13px;
}
.offer-row:last-child{ border-bottom:none; }
.offer-row.best{ background:var(--amber-soft); }
.rank{
  font-family:'IBM Plex Mono',monospace;
  font-weight:600;
  color:var(--ink-soft);
  font-size:12px;
}
.offer-row.best .rank{ color:var(--amber); }
.fornecedor-nome{ font-weight:600; }
.fornecedor-sub{ font-size:11.5px; color:var(--ink-soft); margin-top:1px;}
.preco{
  font-family:'IBM Plex Mono',monospace;
  font-weight:600;
  font-size:14px;
}
.badge-melhor{
  font-size:10px;
  font-weight:700;
  color:#8A5A0A;
  background:#FBDFA8;
  padding:2px 7px;
  border-radius:20px;
  letter-spacing:0.03em;
  margin-left:6px;
  vertical-align:middle;
  text-transform:uppercase;
}
.offer-table-header{
  display:grid;
  grid-template-columns:28px 1.6fr 1fr 1fr 1.4fr 0.9fr;
  gap:10px;
  padding:8px 18px;
  font-size:10.5px;
  text-transform:uppercase;
  letter-spacing:0.04em;
  color:var(--ink-soft);
  border-top:1px solid var(--line);
  background:#FAFBFB;
}

.empty-state{
  text-align:center;
  padding:60px 20px;
  color:var(--ink-soft);
}
.empty-state .big{ font-size:32px; margin-bottom:8px; }

/* Tables (Fornecedores / Itens) */
.toolbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}
.btn{
  font-family:'Inter',sans-serif;
  font-weight:600;
  font-size:13px;
  padding:10px 16px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  background:var(--teal);
  color:#fff;
  transition:background .15s ease;
}
.btn:hover{ background:var(--teal-dark); }
.btn.secondary{
  background:transparent;
  color:var(--ink-soft);
  border:1.5px solid var(--line);
}
.btn.secondary:hover{ background:#F0F2F1; color:var(--ink); }
.btn.danger-txt{
  background:transparent;
  color:var(--danger);
  padding:6px 8px;
  font-size:12px;
}
.btn.small{ padding:6px 10px; font-size:12px; }

.data-table{
  width:100%;
  border-collapse:collapse;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
}
.data-table th{
  text-align:left;
  font-size:10.5px;
  text-transform:uppercase;
  letter-spacing:0.04em;
  color:var(--ink-soft);
  padding:10px 14px;
  background:#FAFBFB;
  border-bottom:1px solid var(--line);
  font-weight:600;
}
.data-table td{
  padding:12px 14px;
  border-bottom:1px solid #EEF2F1;
  font-size:13px;
  vertical-align:top;
}
.data-table tr:last-child td{ border-bottom:none; }
.mono{ font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--ink-soft); }

/* Modal */
.modal-overlay{
  position:fixed; inset:0;
  background:rgba(20,30,28,0.45);
  display:flex; align-items:center; justify-content:center;
  z-index:50;
  padding:20px;
}
.modal{
  background:var(--surface);
  border-radius:14px;
  width:100%;
  max-width:440px;
  padding:26px;
  max-height:88vh;
  overflow-y:auto;
}
.modal h3{
  font-family:'Space Grotesk',sans-serif;
  margin:0 0 18px 0;
  font-size:18px;
}
.field{ margin-bottom:14px; }
.field label{
  display:block;
  font-size:12px;
  font-weight:600;
  color:var(--ink-soft);
  margin-bottom:5px;
}
.field input, .field select{
  width:100%;
  padding:10px 12px;
  border:1.5px solid var(--line);
  border-radius:7px;
  font-size:13.5px;
  font-family:'Inter',sans-serif;
  outline:none;
  background:#fff;
  color:var(--ink);
}
.field input:focus, .field select:focus{ border-color:var(--teal); }
.field-row{ display:flex; gap:10px; }
.field-row .field{ flex:1; }
.modal-actions{
  display:flex; justify-content:flex-end; gap:10px; margin-top:20px;
}

.toast{
  position:fixed;
  bottom:24px;
  right:24px;
  background:var(--teal-dark);
  color:#fff;
  padding:12px 18px;
  border-radius:8px;
  font-size:13px;
  font-weight:500;
  box-shadow:0 8px 24px rgba(0,0,0,0.18);
  z-index:100;
  animation:fadeUp .2s ease;
}
@keyframes fadeUp{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

.loading-screen{
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; color:var(--ink-soft); font-size:13px;
}

/* Login screen */
.login-wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(160deg, var(--teal-dark) 0%, var(--teal) 55%, #56AEEA 100%);
  padding:20px;
}
.login-card{
  background:var(--surface);
  border-radius:16px;
  width:100%;
  max-width:400px;
  padding:34px 30px;
  box-shadow:0 20px 60px rgba(15,60,90,0.28);
}
.login-brand{
  font-family:'Space Grotesk',sans-serif;
  font-weight:700;
  font-size:22px;
  color:var(--teal-dark);
  margin:0;
  letter-spacing:-0.02em;
}
.login-sub{
  color:var(--ink-soft);
  font-size:13px;
  margin:4px 0 26px 0;
}
.user-tile{
  display:flex;
  align-items:center;
  gap:12px;
  width:100%;
  padding:12px 14px;
  border:1.5px solid var(--line);
  border-radius:10px;
  background:#fff;
  cursor:pointer;
  margin-bottom:10px;
  font-family:'Inter',sans-serif;
  text-align:left;
  transition:border-color .15s ease, background .15s ease;
}
.user-tile:hover{ border-color:var(--teal); background:var(--blue-pale); }
.user-avatar{
  width:34px; height:34px;
  border-radius:50%;
  background:var(--teal);
  color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-weight:700;
  font-size:14px;
  font-family:'Space Grotesk',sans-serif;
  flex-shrink:0;
}
.user-tile-name{ font-weight:600; font-size:14px; color:var(--ink); }
.login-error{
  color:var(--danger);
  font-size:12.5px;
  margin:-8px 0 14px 0;
}
.login-link-row{
  margin-top:16px;
  text-align:center;
}
.login-link{
  background:none;
  border:none;
  color:var(--teal);
  font-weight:600;
  font-size:13px;
  cursor:pointer;
  font-family:'Inter',sans-serif;
}
.login-link:hover{ text-decoration:underline; }

.chip-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:-8px 0 20px 0;
}
.chip{
  font-family:'Inter',sans-serif;
  font-size:12px;
  font-weight:600;
  padding:6px 12px;
  border-radius:20px;
  border:1.5px solid var(--line);
  background:#fff;
  color:var(--ink-soft);
  cursor:pointer;
  transition:all .12s ease;
}
.chip:hover{ border-color:var(--teal); color:var(--teal-dark); }
.chip.active{ background:var(--teal); border-color:var(--teal); color:#fff; }

.item-card{ animation:cardIn .18s ease; }
@keyframes cardIn{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

mark.hl{
  background:var(--amber-soft);
  color:var(--teal-dark);
  border-radius:3px;
  padding:0 1px;
  font-weight:700;
}

.mini-badge{
  display:inline-flex;
  align-items:center;
  gap:3px;
  font-size:10.5px;
  font-weight:600;
  padding:2px 8px;
  border-radius:20px;
  background:var(--blue-pale);
  color:var(--teal-dark);
  white-space:nowrap;
}
.mini-badge.pagamento{ background:#F1F5EC; color:#4C6B2E; }
.badge-row{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-top:4px;
}

.pay-chip{
  font-family:'Inter',sans-serif;
  font-size:12px;
  font-weight:600;
  padding:6px 11px;
  border-radius:20px;
  border:1.5px solid var(--line);
  background:#fff;
  color:var(--ink-soft);
  cursor:pointer;
  transition:all .12s ease;
}
.pay-chip:hover{ border-color:var(--teal); }
.pay-chip.selected{ background:var(--teal); border-color:var(--teal); color:#fff; }

.price-hint{
  font-size:12px;
  color:var(--ink-soft);
  margin-top:-8px;
  margin-bottom:14px;
  min-height:16px;
}
.price-hint.best{ color:#4C8A3A; font-weight:600; }

.confirm-overlay{
  position:fixed; inset:0;
  background:rgba(20,30,28,0.5);
  display:flex; align-items:center; justify-content:center;
  z-index:60;
  padding:20px;
}
.confirm-box{
  background:var(--surface);
  border-radius:14px;
  width:100%;
  max-width:380px;
  padding:24px;
  text-align:left;
}
.confirm-box p{
  font-size:14px;
  color:var(--ink);
  margin:0 0 20px 0;
  line-height:1.5;
}
.retry-banner{
  background:#FBEAE7;
  border:1px solid #F0C4BC;
  color:var(--danger);
  border-radius:8px;
  padding:10px 14px;
  font-size:12.5px;
  margin-bottom:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.scroll-panel{
  max-height:280px;
  overflow-y:auto;
}
.scroll-panel::-webkit-scrollbar{ width:7px; }
.scroll-panel::-webkit-scrollbar-track{ background:transparent; }
.scroll-panel::-webkit-scrollbar-thumb{ background:var(--line); border-radius:10px; }
.scroll-panel::-webkit-scrollbar-thumb:hover{ background:var(--teal); }

.section-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 18px 6px 18px;
  cursor:pointer;
}
.section-header:hover{ background:#FAFBFB; }

/* Prévia de Cotação */
.cotacao-add-row{
  display:flex;
  gap:10px;
  align-items:flex-end;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:14px 16px;
  margin-bottom:18px;
  flex-wrap:wrap;
}
.cotacao-add-row .field{ margin-bottom:0; flex:1; min-width:160px; }
.cotacao-selected-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:10px 16px;
  border-bottom:1px solid #EEF2F1;
  flex-wrap:wrap;
}
.cotacao-selected-row:last-child{ border-bottom:none; }
.cotacao-qty-input{
  width:70px;
  padding:6px 8px;
  border:1.5px solid var(--line);
  border-radius:6px;
  font-size:13px;
  text-align:center;
}
.cotacao-supplier-card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  margin-bottom:16px;
  overflow:hidden;
}
.cotacao-supplier-card.winner{
  border-color:var(--amber);
  box-shadow:0 0 0 1px var(--amber);
}
.cotacao-supplier-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  padding:14px 18px;
  flex-wrap:wrap;
  background:#FAFBFB;
}
.cotacao-item-line{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  padding:9px 18px;
  border-bottom:1px solid #F1F3F2;
  font-size:13px;
  flex-wrap:wrap;
}
.cotacao-item-line:last-child{ border-bottom:none; }
.cotacao-item-line.missing{ color:var(--ink-soft); background:#FBF7F2; }
.cotacao-total-line{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 18px;
  background:#FAFBFB;
  border-top:1px solid var(--line);
  font-weight:700;
}
.savings-box{
  background:var(--blue-pale);
  border-radius:10px;
  padding:16px 18px;
  margin-bottom:18px;
  font-size:13.5px;
}
.savings-box.combo{ background:var(--amber-soft); }
.savings-box .big-number{
  font-family:'Space Grotesk',sans-serif;
  font-size:22px;
  font-weight:700;
  color:var(--teal-dark);
}
.savings-box.combo .big-number{ color:#8A5A0A; }

@media print{
  body *{ visibility:hidden; }
  .print-area, .print-area *{ visibility:visible; }
  .print-area{ position:absolute; left:0; top:0; width:100%; padding:20px; }
  .no-print{ display:none !important; }
}

/* Dashboard */
.dash-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(170px, 1fr));
  gap:14px;
  margin-bottom:24px;
}
.dash-card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px 18px;
  cursor:pointer;
  transition:box-shadow .15s ease, transform .1s ease, border-color .15s ease;
}
.dash-card:hover{
  box-shadow:0 6px 18px rgba(15,60,90,0.12);
  transform:translateY(-1px);
  border-color:var(--teal);
}
.dash-card .dash-icon{ font-size:19px; }
.dash-card .dash-value{
  font-family:'Space Grotesk',sans-serif;
  font-size:21px;
  font-weight:700;
  margin:6px 0 2px 0;
  color:var(--ink);
}
.dash-card .dash-label{ font-size:12px; color:var(--ink-soft); font-weight:600; }
.dash-card .dash-sub{ font-size:11px; color:var(--ink-soft); margin-top:4px; }
.dash-card.alert .dash-value{ color:var(--danger); }
.dash-card.good .dash-value{ color:#4C8A3A; }

.dash-section-title{
  font-family:'Space Grotesk',sans-serif;
  font-weight:700;
  font-size:15.5px;
  margin:0 0 10px 0;
  display:flex;
  align-items:center;
  gap:8px;
}
.dash-row{
  display:flex;
  gap:16px;
  flex-wrap:wrap;
  margin-bottom:20px;
}
.dash-panel{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px 18px;
  flex:1;
  min-width:300px;
}
.dash-list-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:9px 0;
  border-bottom:1px solid #EEF2F1;
  cursor:pointer;
  font-size:13px;
}
.dash-list-row:last-child{ border-bottom:none; }
.dash-list-row:hover{ background:#FAFBFB; margin:0 -8px; padding-left:8px; padding-right:8px; border-radius:6px; }
.dash-rank{
  font-family:'IBM Plex Mono',monospace;
  font-weight:700;
  font-size:12px;
  color:var(--ink-soft);
  width:20px;
  flex-shrink:0;
}
.dash-empty{
  color:var(--ink-soft);
  font-size:12.5px;
  padding:8px 0;
}
.dash-alert-row{
  padding:9px 0;
  border-bottom:1px solid #EEF2F1;
  cursor:pointer;
  font-size:12.5px;
}
.dash-alert-row:last-child{ border-bottom:none; }
.dash-alert-row:hover{ background:#FAFBFB; }

// Componente reutilizável: linha de chips de seleção única (clicar escolhe, clicar de novo desmarca)
function buildSingleChipSelector(options, initialValue){
  let selected = initialValue || '';
  const wrapper = el('div', {});
  const chipRow = el('div', {class:'chip-row', style:'margin-bottom:8px;'});
  function renderChips(){
    chipRow.innerHTML = '';
    const allOptions = selected && !options.includes(selected) ? [...options, selected] : options;
    allOptions.forEach(opt=>{
      const active = selected === opt;
      chipRow.appendChild(el('button', {class:'pay-chip' + (active?' selected':''), onClick:(e)=>{
        e.preventDefault();
        selected = active ? '' : opt;
        renderChips();
      }}, opt));
    });
  }
  renderChips();
  wrapper.appendChild(chipRow);
  return { wrapper, getValue: ()=>selected, addOption: (val)=>{ selected = val; renderChips(); } };
}

function dbError(error){
  if(error) throw new Error(error.message || String(error));
}

async function syncTable(table, rows){
  const { data: existing, error: readError } = await supabaseClient
    .from(table)
    .select('id');
  dbError(readError);

  const wanted = new Set(rows.map(r => r.id));
  const stale = (existing || []).map(r => r.id).filter(id => !wanted.has(id));

  if(stale.length){
    const { error } = await supabaseClient.from(table).delete().in('id', stale);
    dbError(error);
  }

  if(rows.length){
    const { error } = await supabaseClient.from(table).upsert(rows, { onConflict:'id' });
    dbError(error);
  }
}

    [fornecedoresRes, itensRes, ofertasRes, historicoRes, pedidosRes, pedidoItensRes, setoresRes, movimentosRes]
      .forEach(r => dbError(r.error));

    state.suppliers = (fornecedoresRes.data || []).map(mapSupplierFromDb);
    state.items = (itensRes.data || []).map(mapItemFromDb);
    state.sectors = (setoresRes.data || []).map(s => ({id:s.id, nome:s.nome || '', descricao:s.descricao || ''}));
    state.stockMovements = (movimentosRes.data || []).map(m => ({
      id:m.id,
      itemId:m.item_id,
      tipo:m.tipo,
      quantidade:Number(m.quantidade || 0),
      data:m.data_movimentacao,
      setorId:m.setor_id || '',
      supplierId:m.fornecedor_id || '',
      pedidoId:m.pedido_id || '',
      responsavel:m.responsavel || '',
      observacao:m.observacao || ''
    }));

    const historyByOffer = {};
    (historicoRes.data || []).forEach(h => {
      (historyByOffer[h.oferta_id] ||= []).push({preco:Number(h.preco), data:(h.registrado_em || '').slice(0,10)});
    });

    state.offers = (ofertasRes.data || []).map(o => ({

    const orderItemsByOrder = {};
    (pedidoItensRes.data || []).forEach(pi => {
      (orderItemsByOrder[pi.pedido_id] ||= []).push({
        itemId:pi.item_id, quantidade:Number(pi.quantidade), precoUnit:Number(pi.preco_unitario),
        fornecedorId:pi.fornecedor_id, ultimoPreco:pi.ultimo_preco === null ? null : Number(pi.ultimo_preco),
        prazoEntrega:pi.prazo_entrega || '', formaPagamento:pi.forma_pagamento || '',
        justificativa:pi.justificativa || '', observacao:pi.observacao || ''
      });

    state.orders = (pedidosRes.data || []).map(p => {
      const itens = orderItemsByOrder[p.id] || [];
      return {
        id:p.id, numero:p.numero, supplierId:itens[0]?.fornecedorId || null,
        data:(p.criado_em || '').slice(0,10), criadoEm:p.criado_em,

async function saveData(shouldRender = true){
  try{
    const supplierRows = state.suppliers.map(s => ({id:s.id,nome:s.nome,cnpj:s.cnpj||null,cidade:s.cidade||null,endereco:s.endereco||null,telefone:s.telefone||null,contato:s.contato||null,prazo_entrega:s.prazoEntrega||null,formas_pagamento:s.formasPagamento||[],segmento:s.segmento||null}));
    const itemRows = state.items.map(i => ({id:i.id,nome:i.nome,categoria:i.categoria||null,unidade:i.unidade||null,ca:i.ca||null,estoque_minimo:Number(i.estoqueMinimo||0)}));
    const offerRows = state.offers.map(o => ({id:o.id,item_id:o.itemId,fornecedor_id:o.supplierId,preco:Number(o.preco)||0,data_atualizacao:o.dataAtualizacao||new Date().toISOString().slice(0,10),observacao:o.obs||null}));
    const sectorRows = state.sectors.map(s => ({id:s.id,nome:s.nome,descricao:s.descricao||null}));
    const movementRows = state.stockMovements.map(m => ({id:m.id,item_id:m.itemId,tipo:m.tipo,quantidade:Number(m.quantidade)||0,data_movimentacao:m.data||new Date().toISOString().slice(0,10),setor_id:m.setorId||null,fornecedor_id:m.supplierId||null,pedido_id:m.pedidoId||null,responsavel:m.responsavel||null,observacao:m.observacao||null}));
    const pedidoRows = state.orders.map((o,index)=>({id:o.id,numero:o.numero||`PED-${(o.data||new Date().toISOString().slice(0,10)).replaceAll('-','')}-${String(index+1).padStart(3,'0')}`,cotacao_origem:o.cotacaoOrigem||null,comprador:o.comprador||state.currentUser?.nome||'Sistema',status:o.status||'Aguardando Confirmação',observacao:o.observacao||null,valor_total:orderTotal(o),criado_em:o.criadoEm||((o.data||new Date().toISOString().slice(0,10))+'T12:00:00')}));

    for(const [table,rows] of [['fornecedores',supplierRows],['itens',itemRows],['ofertas',offerRows],['setores',sectorRows],['pedidos',pedidoRows],['movimentacoes_estoque',movementRows]]){

function el(tag, props, ...children){
  const node = document.createElement(tag);
  if(props){
    for(const k in props){
      const v = props[k];
      if(v === null || v === undefined) continue; // evita setar atributos como a string "null"
      if(k === 'class') node.className = v;
      else if(k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2).toLowerCase(), v);
      else if(k === 'html') node.innerHTML = v;
      else node.setAttribute(k, v);
    }
  }
  children.flat().forEach(c=>{
    if(c === null || c === undefined || c === false) return;
    if(typeof c === 'string' || typeof c === 'number') node.appendChild(document.createTextNode(c));
    else node.appendChild(c);
  });
  return node;
}

// Atualiza/gera as ofertas (item+fornecedor+preço) de um item a partir de linhas de formulário,
// preservando o histórico de preço de vínculos já existentes.
function reconcileOffers(itemId, rows){
  const today = new Date().toISOString().slice(0,10);
  const existingBySupplier = {};
  state.offers.filter(o => o.itemId === itemId).forEach(o => { existingBySupplier[o.supplierId] = o; });

  const kept = [];
  rows.forEach(row => {
    const preco = parseFloat(row.preco);
    if(!row.supplierId || !(preco > 0)) return;
    const existing = existingBySupplier[row.supplierId];
    if(existing){
      if(Number(existing.preco) !== preco){
        if(!existing.historico || existing.historico.length === 0){
          existing.historico = [{ preco: existing.preco, data: existing.dataAtualizacao || today }];
        }
        existing.historico.push({ preco, data: today });
        existing.preco = preco;
        existing.dataAtualizacao = today;
      }
      kept.push(existing);
    } else {
      kept.push({ id: uid(), itemId, supplierId: row.supplierId, preco, dataAtualizacao: today, obs: '', historico: [{ preco, data: today }] });
    }
  });

  state.offers = state.offers.filter(o => o.itemId !== itemId).concat(kept);
}

function orderTotal(order){
  return (order.itens||[]).reduce((sum, it) => sum + (Number(it.quantidade)||0) * (Number(it.precoUnit)||0), 0);
}

function lastOrderForSupplier(supplierId){
  const list = state.orders.filter(o=>o.supplierId===supplierId).slice().sort((a,b)=> b.data.localeCompare(a.data));
  return list[0] || null;
}

function highlightMatch(text, term){
  if(!term || !text) return [text || ''];
  const idx = text.toLowerCase().indexOf(term.toLowerCase());
  if(idx === -1) return [text];
  const before = text.slice(0, idx);
  const match = text.slice(idx, idx + term.length);
  const after = text.slice(idx + term.length);
  return [before, el('mark', {class:'hl'}, match), after];
}

function itemMatchesTerm(item, term){
  if(!term) return true;
  if(item.nome.toLowerCase().includes(term)) return true;
  if((item.categoria||'').toLowerCase().includes(term)) return true;
  if((item.ca||'').toLowerCase().includes(term)) return true;
  const offers = state.offers.filter(o=>o.itemId===item.id);
  return offers.some(o=>{
    const s = supplierById(o.supplierId);
    if(!s) return false;
    return (s.nome||'').toLowerCase().includes(term) || (s.cidade||'').toLowerCase().includes(term);
  });
}

function renderResultsList(){
  const term = (state.searchTerm || '').trim().toLowerCase();
  let filteredItems = term ? state.items.filter(i => itemMatchesTerm(i, term)) : state.items.slice();

  if(term){
    filteredItems.sort((a,b)=>{
      const aStarts = a.nome.toLowerCase().startsWith(term) ? 0 : 1;
      const bStarts = b.nome.toLowerCase().startsWith(term) ? 0 : 1;
      if(aStarts !== bStarts) return aStarts - bStarts;
      return a.nome.localeCompare(b.nome);
    });
  }

  const holder = el('div', {});

  if(filteredItems.length === 0){
    holder.appendChild(el('div', {class:'empty-state'},
      el('div', {class:'big'}, '🗂️'),
      el('div', {}, term ? `Nenhum item, fornecedor ou cidade encontrado para "${state.searchTerm}".` : 'Nenhum item cadastrado ainda.'),
    ));
    return holder;
  }

  // Se a busca resultou em exatamente 1 item, já abre ele automaticamente
  if(term && filteredItems.length === 1 && state.expandedItem !== filteredItems[0].id){
    state.expandedItem = filteredItems[0].id;
  }

  filteredItems.forEach(item => {
    const offers = state.offers.filter(o => o.itemId === item.id).slice().sort((a,b)=>a.preco-b.preco);
    const isOpen = state.expandedItem === item.id;

    const card = el('div', {class:'item-card'});
    const head = el('div', {class:'item-card-head', onClick: ()=>{
        state.expandedItem = isOpen ? null : item.id;
        renderResultsOnly();
      }},
      el('div', {},
        el('div', {class:'item-name'}, ...highlightMatch(item.nome, term)),
        el('div', {class:'item-meta'}, `${item.categoria || 'Sem categoria'} · unidade: ${item.unidade || '—'}${item.ca ? ' · CA ' + item.ca : ''}`),
      ),
      el('div', {style:'display:flex;align-items:center;gap:10px;'},
        el('span', {class:'item-count'}, offers.length === 1 ? '1 fornecedor' : `${offers.length} fornecedores`),
        el('span', {class:'chevron' + (isOpen?' open':'')}, '▶')
      )
    );
    card.appendChild(head);

    if(isOpen){
      if(offers.length === 0){
        card.appendChild(el('div', {class:'empty-state'},
          el('div', {}, 'Nenhum fornecedor cadastrado para este item ainda.'),
          el('button', {class:'btn small', style:'margin-top:10px;', onClick:()=>{ openOfferModal(null, item.id); }}, '+ Cadastrar preço de fornecedor')
        ));
      } else {
        const table = el('div', {class:'offer-table'});
        table.appendChild(el('div', {class:'offer-table-header'},
          el('span',{},'#'), el('span',{},'Fornecedor'), el('span',{},'Cidade'), el('span',{},'CNPJ'), el('span',{},'Contato'), el('span',{},'Preço')
        ));
        offers.forEach((o, idx) => {
          const s = supplierById(o.supplierId);
          if(!s) return;
          const row = el('div', {class:'offer-row' + (idx===0 ? ' best':'')},
            el('span', {class:'rank'}, String(idx+1).padStart(2,'0')),
            el('div', {},
              el('div', {class:'fornecedor-nome'}, s.nome),
              el('div', {class:'fornecedor-sub'}, s.endereco || ''),
              renderSupplierBadges(s)
            ),
            el('span', {}, s.cidade || '—'),
            el('span', {class:'mono'}, s.cnpj || '—'),
            el('div', {},
              el('div', {}, s.contato || '—'),
              el('div', {class:'fornecedor-sub'}, s.telefone || '')
            ),
            el('div', {},
              el('span', {class:'preco'}, fmtMoney(o.preco)),
              idx===0 ? el('span', {class:'badge-melhor'}, 'melhor preço') : null,
              el('div', {class:'fornecedor-sub'}, `atualizado ${fmtDate(o.dataAtualizacao)}`),
              (o.historico && o.historico.length > 1) ? el('button', {class:'login-link', style:'font-size:11px;margin-top:2px;', onClick:(e)=>{ e.stopPropagation(); openHistoryModal(o); }}, '📈 histórico') : null
            )
          );
          table.appendChild(row);
        });
        card.appendChild(table);
        const footRow = el('div', {style:'padding:10px 18px;border-top:1px solid var(--line);'},
          el('button', {class:'btn secondary small', onClick:()=>openOfferModal(null, item.id)}, '+ Adicionar fornecedor a este item')
        );
        card.appendChild(footRow);
      }
    }

    holder.appendChild(card);
  });

  return holder;
}

/* ---------------- Dashboard ---------------- */

function escapeXml(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function monthLabel(ym){
  const partes = ym.split('-');
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return meses[parseInt(partes[1],10)-1] + '/' + partes[0].slice(2);
}

function svgBarChartHTML(data, opts){
  opts = opts || {};
  const width = opts.width || 560;
  const height = opts.height || 190;
  const padding = 34;
  if(data.length === 0){
    return `<div class="dash-empty">Sem dados suficientes ainda para este gráfico.</div>`;
  }
  const maxVal = Math.max(1, ...data.map(d=>d.value));
  const n = data.length;
  const gap = (width - padding*2) / n;
  const barWidth = Math.min(46, gap*0.55);
  let bars = '';
  data.forEach((d,i)=>{
    const barHeight = (d.value / maxVal) * (height - padding*2 - 14);
    const x = padding + i*gap + (gap-barWidth)/2;
    const y = height - padding - barHeight;
    bars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barWidth.toFixed(1)}" height="${Math.max(barHeight,0).toFixed(1)}" rx="4" fill="${opts.color || 'var(--teal)'}"></rect>`;
    bars += `<text x="${(x+barWidth/2).toFixed(1)}" y="${(height-padding+16).toFixed(1)}" font-size="10" fill="var(--ink-soft)" text-anchor="middle" font-family="Inter, sans-serif">${escapeXml(d.label)}</text>`;
    if(d.value > 0){
      bars += `<text x="${(x+barWidth/2).toFixed(1)}" y="${(y-6).toFixed(1)}" font-size="9.5" fill="var(--ink)" text-anchor="middle" font-weight="700" font-family="Inter, sans-serif">${escapeXml(d.valueLabel !== undefined ? d.valueLabel : d.value)}</text>`;
    }
  });
  bars += `<line x1="${padding}" y1="${height-padding}" x2="${width-padding}" y2="${height-padding}" stroke="var(--line)" stroke-width="1"></line>`;
  return `<svg viewBox="0 0 ${width} ${height}" style="width:100%;height:${height}px;display:block;" xmlns="http://www.w3.org/2000/svg">${bars}</svg>`;
}

function svgLineChartHTML(data, opts){
  opts = opts || {};
  const width = opts.width || 560;
  const height = opts.height || 190;
  const padding = 34;
  if(data.length === 0){
    return `<div class="dash-empty">Sem histórico de preço suficiente ainda para este gráfico.</div>`;
  }
  const maxVal = Math.max(...data.map(d=>d.value));
  const minVal = Math.min(...data.map(d=>d.value));
  const n = data.length;
  const stepX = n > 1 ? (width - padding*2) / (n-1) : 0;
  const range = (maxVal - minVal) || 1;
  const points = data.map((d,i)=>{
    const x = padding + i*stepX;
    const y = height - padding - ((d.value - minVal)/range) * (height - padding*2 - 14);
    return { x, y, label: d.label, value: d.value };
  });
  const pathD = points.map((p,i)=> (i===0?'M':'L') + p.x.toFixed(1) + ' ' + p.y.toFixed(1)).join(' ');
  let dots = '';
  points.forEach(p=>{
    dots += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" fill="${opts.color || 'var(--teal)'}"></circle>`;
    dots += `<text x="${p.x.toFixed(1)}" y="${(p.y-9).toFixed(1)}" font-size="9.5" fill="var(--ink)" text-anchor="middle" font-weight="700" font-family="Inter, sans-serif">${escapeXml(p.value)}</text>`;
    dots += `<text x="${p.x.toFixed(1)}" y="${(height-padding+16).toFixed(1)}" font-size="10" fill="var(--ink-soft)" text-anchor="middle" font-family="Inter, sans-serif">${escapeXml(p.label)}</text>`;
  });
  return `<svg viewBox="0 0 ${width} ${height}" style="width:100%;height:${height}px;display:block;" xmlns="http://www.w3.org/2000/svg">
    <path d="${pathD}" fill="none" stroke="${opts.color || 'var(--teal)'}" stroke-width="2.5"></path>
    ${dots}
    <line x1="${padding}" y1="${height-padding}" x2="${width-padding}" y2="${height-padding}" stroke="var(--line)" stroke-width="1"></line>
  </svg>`;
}

function computeGastosMensais(){
  const map = {};
  state.orders.forEach(o=>{
    if(!o.data) return;
    const ym = o.data.slice(0,7);
    map[ym] = (map[ym]||0) + orderTotal(o);
  });
  const keys = Object.keys(map).sort().slice(-8);
  return keys.map(ym => ({ label: monthLabel(ym), value: Math.round(map[ym]*100)/100, valueLabel: fmtMoney(map[ym]).replace('R$\u00A0','').replace('R$ ','') }));
}

function computeDistribuicaoSegmento(){
  const map = {};
  state.orders.forEach(o=>{
    const s = supplierById(o.supplierId);
    const seg = (s && s.segmento && s.segmento.trim()) ? s.segmento.trim() : 'Sem segmento';
    map[seg] = (map[seg]||0) + orderTotal(o);
  });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).map(([label,value])=>({
    label, value: Math.round(value*100)/100, valueLabel: fmtMoney(value).replace('R$\u00A0','').replace('R$ ','')
  }));
}

function computePriceIndexMensal(){
  const monthMap = {};
  state.offers.forEach(o=>{
    const hist = (o.historico && o.historico.length) ? o.historico.slice().sort((a,b)=>a.data.localeCompare(b.data)) : [{preco:o.preco, data:o.dataAtualizacao}];
    const base = hist[0].preco || 1;
    hist.forEach(h=>{
      if(!h.data) return;
      const ym = h.data.slice(0,7);
      const idx = base ? (h.preco/base)*100 : 100;
      if(!monthMap[ym]) monthMap[ym] = { sum:0, count:0 };
      monthMap[ym].sum += idx;
      monthMap[ym].count += 1;
    });
  });
  const keys = Object.keys(monthMap).sort().slice(-8);
  return keys.map(ym => ({ label: monthLabel(ym), value: Math.round(monthMap[ym].sum/monthMap[ym].count) }));
}

function computeEconomiaIdentificada(){
  let economia = 0;
  state.orders.forEach(o=>{
    (o.itens||[]).forEach(it=>{
      const offersForItem = state.offers.filter(of=>of.itemId===it.itemId);
      if(offersForItem.length === 0) return;
      const menor = Math.min(...offersForItem.map(of=>of.preco));
      const diff = (Number(it.precoUnit) - menor) * Number(it.quantidade);
      if(diff > 0) economia += diff;
    });
  });
  return economia;
}

function computeFornecedoresMaisUtilizados(limit){
  const map = {};
  state.orders.forEach(o=>{
    if(!map[o.supplierId]) map[o.supplierId] = { count:0, total:0 };
    map[o.supplierId].count += 1;
    map[o.supplierId].total += orderTotal(o);
  });
  return Object.entries(map)
    .map(([supplierId,d]) => ({ supplier: supplierById(supplierId), ...d }))
    .filter(x=>x.supplier)
    .sort((a,b)=>b.total-a.total)
    .slice(0, limit || 5);
}

function computeItensMaisComprados(limit){
  const map = {};
  state.orders.forEach(o=>{
    (o.itens||[]).forEach(it=>{
      if(!map[it.itemId]) map[it.itemId] = { quantidade:0, valor:0 };
      map[it.itemId].quantidade += Number(it.quantidade)||0;
      map[it.itemId].valor += (Number(it.quantidade)||0) * (Number(it.precoUnit)||0);
    });
  });
  return Object.entries(map)
    .map(([itemId,d]) => ({ item: itemById(itemId), ...d }))
    .filter(x=>x.item)
    .sort((a,b)=>b.quantidade-a.quantidade)
    .slice(0, limit || 5);
}

function computeItensSemCotacao(){
  return state.items.filter(i => !state.offers.some(o=>o.itemId===i.id));
}

function computeFornecedoresSemMovimentacao(diasLimite){
  diasLimite = diasLimite || 45;
  const hoje = new Date();
  return state.suppliers.map(s=>{
    const ultimo = lastOrderForSupplier(s.id);
    const dias = ultimo ? Math.floor((hoje - new Date(ultimo.data)) / 86400000) : null;
    return { supplier: s, ultimoPedido: ultimo, dias };
  }).filter(x => x.dias === null || x.dias > diasLimite)
    .sort((a,b)=> (b.dias ?? 99999) - (a.dias ?? 99999));
}

function computeAlertasAumento(){
  const alerts = [];
  state.offers.forEach(o=>{
    if(!o.historico || o.historico.length < 2) return;
    const hist = o.historico.slice().sort((a,b)=>a.data.localeCompare(b.data));
    const last = hist[hist.length-1];
    const prev = hist[hist.length-2];
    if(last.preco > prev.preco){
      const pct = prev.preco ? ((last.preco - prev.preco)/prev.preco) * 100 : 0;
      alerts.push({ offer:o, item:itemById(o.itemId), supplier:supplierById(o.supplierId), de:prev.preco, para:last.preco, pct, data:last.data });
    }
  });
  return alerts.filter(a=>a.item && a.supplier).sort((a,b)=>b.pct-a.pct);
}

function computeCotacaoComparison(){
  const itens = state.cotacaoItens.filter(ci => itemById(ci.itemId) && Number(ci.quantidade) > 0);
  if(itens.length === 0) return null;

  const supplierIds = new Set();
  itens.forEach(ci=>{
    state.offers.filter(o=>o.itemId===ci.itemId).forEach(o=>supplierIds.add(o.supplierId));
  });

  const results = [...supplierIds].map(supplierId=>{
    const supplier = supplierById(supplierId);
    let total = 0;
    const disponiveis = [];
    const indisponiveis = [];
    itens.forEach(ci=>{
      const offer = state.offers.find(o=>o.supplierId===supplierId && o.itemId===ci.itemId);
      const item = itemById(ci.itemId);
      if(offer){
        const subtotal = offer.preco * Number(ci.quantidade);
        total += subtotal;
        disponiveis.push({ item, quantidade: Number(ci.quantidade), preco: offer.preco, subtotal });
      } else {
        indisponiveis.push({ item, quantidade: Number(ci.quantidade) });
      }
    });
    return { supplier, total, disponiveis, indisponiveis, completo: indisponiveis.length === 0 };
  }).filter(r => r.supplier);

  results.sort((a,b)=> a.total - b.total);

  // Melhor combinação: para cada item, o fornecedor mais barato entre os que o possuem
  const combinacao = [];
  let combinacaoTotal = 0;
  const itensSemFornecedor = [];
  itens.forEach(ci=>{
    const item = itemById(ci.itemId);
    const offersForItem = state.offers.filter(o=>o.itemId===ci.itemId);
    if(offersForItem.length === 0){
      itensSemFornecedor.push(item);
      return;
    }
    const best = offersForItem.slice().sort((a,b)=>a.preco-b.preco)[0];
    const supplier = supplierById(best.supplierId);
    const subtotal = best.preco * Number(ci.quantidade);
    combinacaoTotal += subtotal;
    combinacao.push({ item, quantidade: Number(ci.quantidade), supplier, preco: best.preco, subtotal });
  });

  return { itens, results, combinacao, combinacaoTotal, itensSemFornecedor };
}

    addRow.appendChild(el('div', {class:'field', style:'flex:0 0 100px;'}, el('label',{style:'font-size:11px;color:var(--ink-soft);display:block;margin-bottom:4px;'},'Quantidade'), qtyInput));
    addRow.appendChild(el('button', {class:'btn', onClick:()=>{
      state.cotacaoItens.push({ itemId: itemSelect.value, quantidade: Number(qtyInput.value)||1 });

    }}, '+ Adicionar à cotação'));
  } else {
    addRow.appendChild(el('span', {style:'color:var(--ink-soft);font-size:13px;'}, 'Todos os itens cadastrados já estão na cotação.'));
  }
  wrap.appendChild(addRow);

  // ---- Lista de itens selecionados ----
  if(state.cotacaoItens.length > 0){
    const selectedCard = el('div', {class:'item-card no-print'});
    selectedCard.appendChild(el('div', {style:'padding:12px 16px;font-weight:700;font-size:13.5px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;'},
      el('span', {}, `📋 Itens na cotação (${state.cotacaoItens.length})`),
      el('button', {class:'btn danger-txt', onClick:()=>{ state.cotacaoItens = []; render(); }}, 'Limpar tudo')
    ));
    state.cotacaoItens.forEach((ci, idx)=>{
      const item = itemById(ci.itemId);
      if(!item) return;
      const row = el('div', {class:'cotacao-selected-row'});

        el('div', {style:'font-weight:600;'}, item.nome),
        el('div', {class:'fornecedor-sub'}, item.categoria || '')
      ));
      const qtyField = el('div', {style:'display:flex;align-items:center;gap:8px;'});
      const qtyInput = el('input', {class:'cotacao-qty-input', type:'number', min:'1', step:'1', value: ci.quantidade});

        ci.quantidade = Number(qtyInput.value) || 1;
        renderCotacaoResultsOnly();
      });

  if(!holder) return;
  holder.innerHTML = '';
  holder.appendChild(renderCotacaoResults());
}

function renderCotacaoResults(){
  const wrap = el('div', {});
  const data = computeCotacaoComparison();

  if(!data){
    wrap.appendChild(el('div', {class:'empty-state'},
      el('div', {class:'big'}, '⚖️'),
      el('div', {}, 'Adicione itens acima para gerar a comparação entre fornecedores.')
    ));
    return wrap;
  }

  if(data.results.length === 0){
    wrap.appendChild(el('div', {class:'empty-state'},
      el('div', {class:'big'}, '🚫'),
      el('div', {}, 'Nenhum fornecedor cadastrado possui os itens selecionados.')
    ));
    return wrap;
  }

  wrap.appendChild(el('div', {style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;'},
    el('h2', {style:'font-family:"Space Grotesk",sans-serif;font-size:17px;margin:0;'}, '📊 Comparação entre fornecedores'),
    el('button', {class:'btn secondary no-print', onClick:()=>window.print()}, '🖨️ Imprimir / Exportar')
  ));

  const completos = data.results.filter(r=>r.completo);
  const melhorCompleto = completos[0] || null;

  // ---- Caixa de economia ----
  if(completos.length >= 2){
    const pior = completos[completos.length-1];
    const economia = pior.total - melhorCompleto.total;
    const economiaPct = pior.total ? (economia / pior.total) * 100 : 0;
    wrap.appendChild(el('div', {class:'savings-box'},
      el('div', {}, `💰 Comprando tudo com `, el('strong',{}, melhorCompleto.supplier.nome), ` em vez de `, el('strong',{}, pior.supplier.nome), `:`),
      el('div', {class:'big-number'}, `Economia de ${fmtMoney(economia)} (${economiaPct.toFixed(1)}%)`)
    ));
  } else if(!melhorCompleto){
    wrap.appendChild(el('div', {class:'savings-box'},
      el('div', {}, '⚠️ Nenhum fornecedor sozinho tem todos os itens desta cotação. Veja a análise de "Melhor Combinação" abaixo para a opção mais barata dividindo entre fornecedores.')
    ));
  }

  // ---- Cards por fornecedor (recolhidos por padrão) ----
  data.results.forEach(r=>{
    const isWinner = melhorCompleto && r.supplier.id === melhorCompleto.supplier.id;
    const isOpen = state.cotacaoExpanded === r.supplier.id;
    const card = el('div', {class:'cotacao-supplier-card' + (isWinner ? ' winner' : '')});

function stockReportDefaultDates(){
  const today=new Date();
  const end=today.toISOString().slice(0,10);
  const start=new Date(today.getFullYear(),today.getMonth(),1).toISOString().slice(0,10);
  if(!state.stockReportStart) state.stockReportStart=start;
  if(!state.stockReportEnd) state.stockReportEnd=end;
}
function stockMovementsInPeriod(start,end){
  return state.stockMovements.filter(m=>{
    const d=String(m.data||'').slice(0,10);
    return d && (!start||d>=start) && (!end||d<=end);
  }).slice().sort((a,b)=>(b.data||'').localeCompare(a.data||''));
}
function stockReportData(start,end){
  const movements=stockMovementsInPeriod(start,end);
  const byItem={};
  movements.forEach(m=>{
    const item=itemById(m.itemId);
    const key=m.itemId||'item-excluido';
    if(!byItem[key]) byItem[key]={
      itemId:key,
      nome:item?.nome||'Item excluído',
      unidade:item?.unidade||'—',
      entradas:0,
      saidas:0,
      movimentacoes:0,
      saldoAtual:item?itemStock(item.id):0
    };
    byItem[key].movimentacoes++;
    if(m.tipo==='entrada') byItem[key].entradas+=Number(m.quantidade)||0;
    else byItem[key].saidas+=Number(m.quantidade)||0;
  });
  const items=Object.values(byItem).map(r=>({...r,saldoPeriodo:r.entradas-r.saidas})).sort((a,b)=>a.nome.localeCompare(b.nome));
  return {
    movements,
    items,
    entradas:movements.filter(m=>m.tipo==='entrada').length,
    saidas:movements.filter(m=>m.tipo==='saida').length,
    itensMovimentados:items.length
  };
}
function csvCell(value){
  const s=String(value??'');
  return /[;"\n\r]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;
}
function downloadStockReportCSV(start,end){
  const report=stockReportData(start,end);
  if(!report.movements.length){showToast('Nenhuma movimentação encontrada no período.');return;}
  const lines=[
    ['RELATÓRIO DE MOVIMENTAÇÕES DE ESTOQUE'],
    ['Período',fmtDate(start),fmtDate(end)],
    [],
    ['RESUMO POR ITEM'],
    ['Item','Unidade','Entradas','Saídas','Saldo do período','Saldo atual','Movimentações']
  ];
  report.items.forEach(r=>lines.push([r.nome,r.unidade,r.entradas,r.saidas,r.saldoPeriodo,r.saldoAtual,r.movimentacoes]));
  lines.push([],['DETALHAMENTO'],['Data','Tipo','Item','Unidade','Quantidade','Setor','Fornecedor','Responsável','Observação']);
  report.movements.forEach(m=>{
    const item=itemById(m.itemId),setor=state.sectors.find(s=>s.id===m.setorId),supplier=supplierById(m.supplierId);
    lines.push([fmtDate(String(m.data||'').slice(0,10)),m.tipo==='entrada'?'Entrada':'Saída',item?.nome||'Item excluído',item?.unidade||'—',m.quantidade,setor?.nome||'',supplier?.nome||'',m.responsavel||'',m.observacao||'']);
  });
  const csv='\uFEFF'+lines.map(row=>row.map(csvCell).join(';')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`relatorio-estoque-${start||'inicio'}-a-${end||'fim'}.csv`;
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  showToast('Relatório CSV exportado.');
}

function renderHistoryModal(){
  const offer = state.modal.offer;
  const item = itemById(offer.itemId);
  const supplier = supplierById(offer.supplierId);
  const modal = el('div', {class:'modal'});
  modal.appendChild(el('h3', {}, '📈 Histórico de preço'));
  modal.appendChild(el('p', {style:'color:var(--ink-soft);font-size:13px;margin:-10px 0 18px 0;'},
    `${item ? item.nome : 'Item'} · ${supplier ? supplier.nome : 'Fornecedor'}`));

  const historico = (offer.historico && offer.historico.length) ? offer.historico.slice() : [{preco: offer.preco, data: offer.dataAtualizacao}];
  historico.sort((a,b)=> a.data.localeCompare(b.data)); // cronológico para calcular variação
  const withDelta = historico.map((h, i)=>{
    const prev = i > 0 ? historico[i-1] : null;
    const delta = prev ? h.preco - prev.preco : 0;
    const pct = prev && prev.preco ? (delta / prev.preco) * 100 : 0;
    return { ...h, delta, pct };
  });
  withDelta.reverse(); // mais recente primeiro

  const first = historico[0];
  const last = historico[historico.length - 1];
  const totalVar = first.preco ? ((last.preco - first.preco) / first.preco) * 100 : 0;
  const summaryColor = totalVar > 0 ? 'var(--danger)' : (totalVar < 0 ? '#4C8A3A' : 'var(--ink-soft)');
  modal.appendChild(el('div', {style:`background:var(--blue-pale);border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:13px;`},
    el('span', {}, `Desde ${fmtDate(first.data)}: `),
    el('span', {style:`font-weight:700;color:${summaryColor};`}, `${totalVar > 0 ? '▲' : totalVar < 0 ? '▼' : '—'} ${Math.abs(totalVar).toFixed(1)}%`),
    el('span', {}, ` (${fmtMoney(first.preco)} → ${fmtMoney(last.preco)})`),
  ));

  const table = el('div', {class:'offer-table', style:'border-top:1px solid var(--line);border-radius:8px;overflow:hidden;'});
  table.appendChild(el('div', {class:'offer-table-header', style:'grid-template-columns:1fr 1fr 1fr;'},
    el('span',{},'Data'), el('span',{},'Preço'), el('span',{},'Variação')
  ));
  withDelta.forEach(h=>{
    let deltaLabel, deltaColor;
    if(h.delta > 0){ deltaLabel = `▲ ${h.pct.toFixed(1)}%`; deltaColor = 'var(--danger)'; }
    else if(h.delta < 0){ deltaLabel = `▼ ${Math.abs(h.pct).toFixed(1)}%`; deltaColor = '#4C8A3A'; }
    else { deltaLabel = '—'; deltaColor = 'var(--ink-soft)'; }
    table.appendChild(el('div', {class:'offer-row', style:'grid-template-columns:1fr 1fr 1fr;'},
      el('span', {}, fmtDate(h.data)),
      el('span', {class:'preco'}, fmtMoney(h.preco)),
      el('span', {style:`color:${deltaColor};font-weight:600;`}, deltaLabel),
    ));
  });
  modal.appendChild(table);

  modal.appendChild(el('div', {class:'modal-actions'},
    el('button', {class:'btn secondary', onClick: closeModal}, 'Fechar')
  ));
  return modal;
}

        ...state.suppliers.map(s => el('option', {value:s.id, selected: row.supplierId===s.id ? 'selected':null}, s.nome))
      );
      supplierSelect.addEventListener('change', ()=>{ row.supplierId = supplierSelect.value; });
      const precoInput = el('input', {type:'number', step:'0.01', min:'0', value: row.preco, placeholder:'Preço (R$)'});
      const bestBadge = el('span', {class:'mini-badge', style:'display:none;margin-left:6px;background:var(--amber-soft);color:#8A5A0A;'}, '🏆 menor');
      precoInput.addEventListener('input', ()=>{ row.preco = precoInput.value; updateBest(); });
      const removeBtn = el('button', {class:'btn danger-txt', title:'Remover', onClick:()=>{
        rows.splice(idx,1);
        renderRows();
      }}, '✕');

      rowEl.appendChild(el('div', {class:'field', style:'flex:1.6;margin-bottom:0;'}, el('label',{}, idx===0?'Fornecedor':''), supplierSelect));
      rowEl.appendChild(el('div', {class:'field', style:'flex:1;margin-bottom:0;'}, el('label',{}, idx===0?'Preço (R$)':''), precoInput, bestBadge));
      rowEl.appendChild(el('div', {style: idx===0 ? 'padding-bottom:2px;' : ''}, removeBtn));
      rowsContainer.appendChild(rowEl);
      rowEls.push(rowEl);
      badgeEls.push(bestBadge);
    });
    updateBest();
    rowsContainer.appendChild(el('button', {class:'btn secondary small', style:'margin-top:2px;', onClick:()=>{
      const usedIds = rows.map(r=>r.supplierId);
      const next = state.suppliers.find(s=>!usedIds.includes(s.id)) || state.suppliers[0];
      rows.push({ supplierId: next.id, preco: '' });
      renderRows();
    }}, '+ Adicionar fornecedor'));
    if(rows.length > 1){
      rowsContainer.appendChild(el('p', {style:'font-size:11.5px;color:var(--ink-soft);margin-top:8px;'},
        '💡 A linha destacada em amarelo mostra o fornecedor com o menor preço digitado até agora.'));
    }
  }
  renderRows();

  const actions = el('div', {class:'modal-actions'},
    el('button', {class:'btn secondary', onClick: closeModal}, 'Cancelar'),
    el('button', {class:'btn', onClick: async ()=>{
      const nome = fields.nome.value.trim();
      if(!nome){ fields.nome.focus(); fields.nome.style.borderColor = 'var(--danger)'; return; }
      const data = {
        nome,
        categoria: categoriaSelector.getValue(),
        unidade: unidadeSelector.getValue(),
        ca: fields.ca.value.trim(),
        estoqueMinimo: Number(fields.estoqueMinimo.value || 0),
      };
      let itemId;
      if(editing){
        Object.assign(editing, data);
        itemId = editing.id;
      } else {
        itemId = uid();
        state.items.push({ id: itemId, ...data });
      }

      // Atualiza os vínculos de preço deste item preservando o histórico dos que já existiam
      reconcileOffers(itemId, rows);

      const ok = await saveData();
      closeModal();
      if(ok) showToast(editing ? 'Item atualizado.' : `Item cadastrado com ${rows.filter(r=>parseFloat(r.preco)>0).length} fornecedor(es).`);
    }}, 'Salvar')
  );
  modal.appendChild(actions);
  return modal;
}

function renderOfferForm(){
  const editing = state.modal.editing;
  const presetItemId = state.modal.presetItemId;
  const modal = el('div', {class:'modal'});
  modal.appendChild(el('h3', {}, editing ? 'Editar preço' : 'Vincular fornecedor a item'));

  if(state.suppliers.length === 0 || state.items.length === 0){
    modal.appendChild(el('p', {style:'color:var(--ink-soft);'}, 'Cadastre pelo menos um fornecedor e um item antes de vincular preços.'));
    modal.appendChild(el('div', {class:'modal-actions'}, el('button', {class:'btn secondary', onClick:closeModal}, 'Fechar')));
    return modal;
  }

  const itemSelect = el('select', {},
    ...state.items.map(i => el('option', {value:i.id, selected: (editing ? editing.itemId===i.id : presetItemId===i.id) ? 'selected' : null}, i.nome))
  );
  const presetSupplierId = state.modal.presetSupplierId;
  const supplierSelect = el('select', {},
    ...state.suppliers.map(s => el('option', {value:s.id, selected: (editing ? editing.supplierId===s.id : presetSupplierId===s.id) ? 'selected' : null}, s.nome))
  );

  modal.appendChild(el('div', {class:'field'}, el('label',{},'Item *'), itemSelect));
  modal.appendChild(el('div', {class:'field'}, el('label',{},'Fornecedor *'), supplierSelect));

  const row = el('div', {class:'field-row'});
  const precoInput = el('input', {type:'number', step:'0.01', min:'0', value: editing ? editing.preco : '', placeholder:'0,00'});
  const dataInput = el('input', {type:'date', value: editing ? editing.dataAtualizacao : new Date().toISOString().slice(0,10)});
  row.appendChild(el('div', {class:'field'}, el('label',{},'Preço (R$) *'), precoInput));
  row.appendChild(el('div', {class:'field'}, el('label',{},'Atualizado em'), dataInput));
  modal.appendChild(row);

  const priceHint = el('div', {class:'price-hint'});
  modal.appendChild(priceHint);

  function updatePriceHint(){
    const itemId = itemSelect.value;
    const otherOffers = state.offers.filter(o => o.itemId === itemId && (!editing || o.id !== editing.id));
    priceHint.className = 'price-hint';
    if(otherOffers.length === 0){
      priceHint.textContent = 'Este será o primeiro preço cadastrado para este item.';
      return;
    }
    const cheapest = otherOffers.slice().sort((a,b)=>a.preco-b.preco)[0];
    const cheapestSupplier = supplierById(cheapest.supplierId);
    const current = parseFloat(precoInput.value);
    if(current > 0 && current < cheapest.preco){
      priceHint.classList.add('best');
      priceHint.textContent = `🏆 Esse valor seria o novo menor preço (atual: ${fmtMoney(cheapest.preco)} de ${cheapestSupplier?.nome || '—'})`;
    } else {
      priceHint.textContent = `Menor preço atual: ${fmtMoney(cheapest.preco)} — ${cheapestSupplier?.nome || '—'}`;
    }
  }
  precoInput.addEventListener('input', updatePriceHint);
  itemSelect.addEventListener('change', updatePriceHint);
  updatePriceHint();

  const obsInput = el('input', {value: editing ? (editing.obs||'') : '', placeholder:'Ex: pedido mínimo, prazo de entrega...'});
  modal.appendChild(el('div', {class:'field'}, el('label',{},'Observação'), obsInput));

  const actions = el('div', {class:'modal-actions'},
    el('button', {class:'btn secondary', onClick: closeModal}, 'Cancelar'),
    el('button', {class:'btn', onClick: async ()=>{
      const preco = parseFloat(precoInput.value);
      if(!preco || preco <= 0){ precoInput.focus(); precoInput.style.borderColor='var(--danger)'; return; }
      const data = {
        itemId: itemSelect.value,
        supplierId: supplierSelect.value,
        preco,
        dataAtualizacao: dataInput.value,
        obs: obsInput.value.trim(),
      };
      if(editing){
        const changed = (Number(editing.preco) !== preco) || (editing.dataAtualizacao !== data.dataAtualizacao);
        if(changed){
          if(!editing.historico || editing.historico.length === 0){
            editing.historico = [{ preco: editing.preco, data: editing.dataAtualizacao }];
          }
          editing.historico.push({ preco, data: data.dataAtualizacao });
        }
        Object.assign(editing, data);
      } else {
        state.offers.push({ id: uid(), ...data, historico: [{ preco, data: data.dataAtualizacao }] });
      }
      const ok = await saveData();
      closeModal();
      if(ok) showToast(editing ? 'Preço atualizado.' : 'Fornecedor vinculado ao item.');
    }}, 'Salvar')
  );
  modal.appendChild(actions);

  if(editing && editing.historico && editing.historico.length > 1){
    modal.appendChild(el('button', {class:'login-link', style:'margin-top:14px;', onClick:()=>{ openHistoryModal(editing); }}, '📈 Ver histórico de preço deste vínculo'));
  }

  return modal;
}

function renderOrderForm(){
  const editing = state.modal.editing;
  const presetSupplierId = state.modal.presetSupplierId;
  const modal = el('div', {class:'modal', style:'max-width:560px;'});
  modal.appendChild(el('h3', {}, editing ? 'Editar pedido' : 'Novo pedido'));

  if(state.suppliers.length === 0 || state.items.length === 0){
    modal.appendChild(el('p', {style:'color:var(--ink-soft);'}, 'Cadastre pelo menos um fornecedor e um item antes de registrar um pedido.'));
    modal.appendChild(el('div', {class:'modal-actions'}, el('button', {class:'btn secondary', onClick:closeModal}, 'Fechar')));
    return modal;
  }

  const supplierSelect = el('select', {},
    ...state.suppliers.map(s => el('option', {value:s.id, selected: (editing ? editing.supplierId===s.id : presetSupplierId===s.id) ? 'selected' : null}, s.nome))
  );
  const dataInput = el('input', {type:'date', value: editing ? editing.data : new Date().toISOString().slice(0,10)});

  const topRow = el('div', {class:'field-row'});
  topRow.appendChild(el('div', {class:'field'}, el('label',{},'Fornecedor *'), supplierSelect));
  topRow.appendChild(el('div', {class:'field'}, el('label',{},'Data do pedido'), dataInput));
  modal.appendChild(topRow);

  modal.appendChild(el('div', {style:'height:1px;background:var(--line);margin:14px 0 14px 0;'}));
  modal.appendChild(el('label', {style:'display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:8px;'}, 'Itens do pedido'));

  const rows = editing
    ? editing.itens.map(it => ({ itemId: it.itemId, quantidade: it.quantidade, precoUnit: it.precoUnit }))
    : [{ itemId: state.items[0].id, quantidade: 1, precoUnit: currentOfferPrice(supplierSelect.value, state.items[0].id) || '' }];

  const rowsContainer = el('div', {});
  modal.appendChild(rowsContainer);

  function currentOfferPrice(supplierId, itemId){
    const offer = state.offers.find(o=>o.supplierId===supplierId && o.itemId===itemId);
    return offer ? offer.preco : null;
  }

  const totalLine = el('div', {style:'text-align:right;font-weight:700;font-size:15px;color:var(--teal-dark);margin:10px 0 4px 0;'});

  function updateTotal(){
    const total = rows.reduce((sum,r)=> sum + (Number(r.quantidade)||0) * (Number(r.precoUnit)||0), 0);
    totalLine.textContent = 'Total do pedido: ' + fmtMoney(total);
  }

  function renderRows(){
    rowsContainer.innerHTML = '';
    rows.forEach((row, idx)=>{
      const rowEl = el('div', {class:'field-row', style:'align-items:flex-end;'});
      const itemSelect = el('select', {},
        ...state.items.map(i => el('option', {value:i.id, selected: row.itemId===i.id ? 'selected':null}, i.nome))
      );
      const qtdInput = el('input', {type:'number', min:'1', step:'1', value: row.quantidade, placeholder:'Qtd'});
      const precoInput = el('input', {type:'number', min:'0', step:'0.01', value: row.precoUnit, placeholder:'Preço unit.'});

      itemSelect.addEventListener('change', ()=>{
        row.itemId = itemSelect.value;
        const suggested = currentOfferPrice(supplierSelect.value, row.itemId);
        if(suggested){ row.precoUnit = suggested; precoInput.value = suggested; }
        updateTotal();
      });
      qtdInput.addEventListener('input', ()=>{ row.quantidade = qtdInput.value; updateTotal(); });
      precoInput.addEventListener('input', ()=>{ row.precoUnit = precoInput.value; updateTotal(); });

      const removeBtn = el('button', {class:'btn danger-txt', title:'Remover', onClick:()=>{ rows.splice(idx,1); renderRows(); updateTotal(); }}, '✕');

      rowEl.appendChild(el('div', {class:'field', style:'flex:1.6;margin-bottom:0;'}, el('label',{}, idx===0?'Item':''), itemSelect));
      rowEl.appendChild(el('div', {class:'field', style:'flex:0.6;margin-bottom:0;'}, el('label',{}, idx===0?'Qtd':''), qtdInput));
      rowEl.appendChild(el('div', {class:'field', style:'flex:0.9;margin-bottom:0;'}, el('label',{}, idx===0?'Preço unit.':''), precoInput));
      rowEl.appendChild(el('div', {style: idx===0 ? 'padding-bottom:2px;' : ''}, removeBtn));
      rowsContainer.appendChild(rowEl);
    });
    rowsContainer.appendChild(el('button', {class:'btn secondary small', style:'margin-top:2px;', onClick:()=>{
      rows.push({ itemId: state.items[0].id, quantidade: 1, precoUnit: currentOfferPrice(supplierSelect.value, state.items[0].id) || '' });
      renderRows();
      updateTotal();
    }}, '+ Adicionar item'));
  }
  renderRows();
  updateTotal();
  modal.appendChild(totalLine);

  const obsInput = el('input', {value: editing ? (editing.observacao||'') : '', placeholder:'Ex: pedido urgente, nota fiscal 12345...'});
  modal.appendChild(el('div', {class:'field'}, el('label',{},'Observação'), obsInput));

  const actions = el('div', {class:'modal-actions'},
    el('button', {class:'btn secondary', onClick: closeModal}, 'Cancelar'),
    el('button', {class:'btn', onClick: async ()=>{
      const supplierId = supplierSelect.value;
      const validRows = rows.filter(r => r.itemId && Number(r.quantidade) > 0 && Number(r.precoUnit) >= 0);
      if(validRows.length === 0){ showToast('Adicione ao menos um item válido ao pedido.'); return; }
      const data = {
        supplierId,
        data: dataInput.value,
        itens: validRows.map(r => ({ itemId: r.itemId, quantidade: Number(r.quantidade), precoUnit: Number(r.precoUnit) })),
        observacao: obsInput.value.trim(),
      };
      if(editing){
        Object.assign(editing, data);
      } else {
        state.orders.push({ id: uid(), ...data });
      }
      const ok = await saveData();
      closeModal();
      if(ok) showToast(editing ? 'Pedido atualizado.' : 'Pedido registrado.');
    }}, 'Salvar pedido')
  );
  modal.appendChild(actions);
  return modal;
}

/* ---------------- Login ---------------- */

function initials(nome){
  return nome.trim().split(/\s+/).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}

function renderLoginScreen(){
  const wrap = el('div', {class:'login-wrap'});
  const card = el('div', {class:'login-card'});

  card.appendChild(el('p', {class:'login-brand'}, 'Meggs Supply'));

  if(state.loginMode === 'password' && state.loginTarget){
    const user = state.loginTarget;
    card.appendChild(el('p', {class:'login-sub'}, `Digite a senha de ${user.nome}`));
    if(state.loginError) card.appendChild(el('div', {class:'login-error'}, state.loginError));
    const pwField = el('div', {class:'field'}, el('label',{},'Senha'), el('input', {type:'password', placeholder:'••••••'}));
    const pwInput = pwField.querySelector('input');
    card.appendChild(pwField);
    const doLogin = ()=>{
      if(pwInput.value === user.senha){
        state.currentUser = user;
        state.loginMode = 'select';
        state.loginTarget = null;
        state.loginError = '';
        render();
      } else {
        state.loginError = 'Senha incorreta. Tente novamente.';
        render();
      }
    };
    pwInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') doLogin(); });
    card.appendChild(el('div', {class:'modal-actions', style:'justify-content:space-between;'},
      el('button', {class:'btn secondary', onClick:()=>{ state.loginMode='select'; state.loginTarget=null; state.loginError=''; render(); }}, 'Voltar'),
      el('button', {class:'btn', onClick: doLogin}, 'Entrar')
    ));
    setTimeout(()=>pwInput.focus(), 0);
  } else if(state.loginMode === 'new'){
    card.appendChild(el('p', {class:'login-sub'}, 'Criar novo usuário'));
    const nomeField = el('div', {class:'field'}, el('label',{},'Nome *'), el('input', {placeholder:'Ex: Ana Souza'}));
    const senhaField = el('div', {class:'field'}, el('label',{},'Senha (opcional)'), el('input', {type:'password', placeholder:'Deixe em branco para não usar senha'}));
    const nomeInput = nomeField.querySelector('input');
    const senhaInput = senhaField.querySelector('input');
    card.appendChild(nomeField);
    card.appendChild(senhaField);
    if(state.loginError) card.appendChild(el('div', {class:'login-error'}, state.loginError));
    card.appendChild(el('div', {class:'modal-actions', style:'justify-content:space-between;'},
      el('button', {class:'btn secondary', onClick:()=>{ state.loginMode='select'; state.loginError=''; render(); }}, 'Voltar'),
      el('button', {class:'btn', onClick: async ()=>{
        const nome = nomeInput.value.trim();
        if(!nome){ nomeInput.focus(); return; }
        if(state.users.some(u=>u.nome.toLowerCase()===nome.toLowerCase())){
          state.loginError = 'Já existe um usuário com esse nome.';
          render();
          return;
        }
        const user = { id: uid(), nome, senha: senhaInput.value };
        state.users.push(user);
        await saveUsers();
        state.currentUser = user;
        state.loginMode = 'select';
        state.loginError = '';
        render();
      }}, 'Criar e entrar')
    ));
  } else {
    card.appendChild(el('p', {class:'login-sub'}, state.users.length ? 'Selecione seu usuário para continuar' : 'Crie o primeiro usuário para começar'));
    state.users.forEach(u=>{
      card.appendChild(el('button', {class:'user-tile', onClick:()=>{
        if(u.senha){
          state.loginMode = 'password';
          state.loginTarget = u;
          state.loginError = '';
        } else {
          state.currentUser = u;
        }
        render();
      }},
        el('div', {class:'user-avatar'}, initials(u.nome)),
        el('div', {class:'user-tile-name'}, u.nome)
      ));
    });
    card.appendChild(el('div', {class:'login-link-row'},
      el('button', {class:'login-link', onClick:()=>{ state.loginMode='new'; state.loginError=''; render(); }}, '+ Criar novo usuário')
    ));
  }

  wrap.appendChild(card);
  return wrap;
}

/* ---------------- Root render ---------------- */

function render(){
  const root = document.getElementById('root');
  root.innerHTML = '';

  if(!state.loaded){
    root.appendChild(el('div', {class:'loading-screen'}, 'Carregando dados...'));
    return;
  }

  if(!state.currentUser){
    root.appendChild(renderLoginScreen());
    return;
  }

  const app = el('div', {class:'app'});
  app.appendChild(renderSidebar());

  const main = el('div', {class:'main'});
  if(state.saveError){
    main.appendChild(el('div', {class:'retry-banner'},
      el('span', {}, '⚠️ A última alteração pode não ter sido salva no servidor.'),
      el('button', {class:'btn small', style:'background:var(--danger);flex-shrink:0;', onClick: saveData}, 'Tentar salvar de novo')
    ));
  }
  if(state.view === 'dashboard'){
    main.appendChild(renderDashboard());
  } else if(state.view === 'buscar'){
    main.appendChild(renderBuscar());
  } else if(state.view === 'fornecedores'){
    main.appendChild(renderFornecedores());
  } else if(state.view === 'itens'){
    main.appendChild(renderItens());
  } else if(state.view === 'pedidos'){
    main.appendChild(renderPedidos());
  } else if(state.view === 'estoque'){
    main.appendChild(renderEstoque());
  } else if(state.view === 'cotacao'){
    main.appendChild(renderCotacao());
  } else if(state.view === 'segmentos'){
    main.appendChild(renderSegmentos());
  }
  app.appendChild(main);
  root.appendChild(app);

  if(state.view === 'buscar'){
    renderResultsOnly();
  }

  const modal = renderModal();
  if(modal) root.appendChild(modal);

  if(state.confirmDialog){
    root.appendChild(renderConfirmDialog());
  }

  if(state.toast){
    root.appendChild(el('div', {class:'toast'}, state.toast));
  }
}

function renderConfirmDialog(){
  const { message, onConfirm } = state.confirmDialog;
  const overlay = el('div', {class:'confirm-overlay', onClick:(e)=>{ if(e.target===e.currentTarget){ state.confirmDialog=null; render(); } }});
  const box = el('div', {class:'confirm-box'});
  box.appendChild(el('p', {}, message));
  box.appendChild(el('div', {class:'modal-actions'},
    el('button', {class:'btn secondary', onClick:()=>{ state.confirmDialog = null; render(); }}, 'Cancelar'),
    el('button', {class:'btn', style:'background:var(--danger);', onClick: async ()=>{
      const action = state.confirmDialog.onConfirm;
      state.confirmDialog = null;
      await action();
    }}, 'Excluir')
  ));
  overlay.appendChild(box);
  return overlay;
}

loadData();
</script>
